# kitty.conf — Nord Theme
# ThinkPad P14s Gen 4 AMD / Arch Linux / Niri

# =============================================================================
# FONT
# =============================================================================
font_family                 JetBrainsMono Nerd Font Regular
bold_font                   auto
italic_font                 auto
bold_italic_font            auto
font_size                   11.0

# Font features
font_features               JetBrainsMonoNF-Regular +liga +calt
font_features               JetBrainsMonoNF-Bold +liga +calt
font_features               JetBrainsMonoNF-Italic +liga +calt

# =============================================================================
# NORD COLOR PALETTE
# =============================================================================

# Polar Night
color0   #3B4252
color8   #4C566A

# Aurora - Red
color1   #BF616A
color9   #BF616A

# Aurora - Green
color2   #A3BE8C
color10  #A3BE8C

# Aurora - Yellow
color3   #EBCB8B
color11  #EBCB8B

# Frost - Blue
color4   #81A1C1
color12  #81A1C1

# Aurora - Purple
color5   #B48EAD
color13  #B48EAD

# Frost - Cyan
color6   #88C0D0
color14  #8FBCBB

# Snow Storm
color7   #E5E9F0
color15  #ECEFF4

# Background / Foreground / Cursor
background              #2E3440
foreground              #D8DEE9
cursor                  #D8DEE9
cursor_text_color       #2E3440

# Selection
selection_background    #4C566A
selection_foreground    #D8DEE9

# URL color
url_color               #88C0D0

# =============================================================================
# WINDOW
# =============================================================================
window_padding_width        12
window_border_width         0
draw_minimal_borders        yes
hide_window_decorations     yes
confirm_os_window_close     0

# =============================================================================
# CURSOR
# =============================================================================
cursor_shape                block
cursor_blink_interval       0

# =============================================================================
# SCROLLBACK
# =============================================================================
scrollback_lines            10000

# =============================================================================
# MOUSE
# =============================================================================
mouse_hide_wait             2.0
focus_follows_mouse         no
copy_on_select no
strip_trailing_spaces smart

# =============================================================================
# PERFORMANCE
# =============================================================================
repaint_delay               10
sync_to_monitor             yes

# =============================================================================
# BELL
# =============================================================================
enable_audio_bell           no
visual_bell_duration        0.0

# =============================================================================
# TAB BAR
# =============================================================================
tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_background          #2E3440
tab_bar_margin_color        #2E3440
active_tab_background       #3B4252
active_tab_foreground       #D8DEE9
inactive_tab_background     #2E3440
inactive_tab_foreground     #4C566A
active_tab_font_style       bold

# =============================================================================
# KEYBOARD SHORTCUTS
# =============================================================================
# Clear all defaults and set minimal binds
clear_all_shortcuts         no

# Copy/paste
map ctrl+shift+c            copy_to_clipboard
map ctrl+shift+v            paste_from_clipboard

# Font size
map ctrl+shift+equal        change_font_size all +1.0
map ctrl+shift+minus        change_font_size all -1.0
map ctrl+shift+0            change_font_size all 0

# Scrolling
map ctrl+shift+k            scroll_line_up
map ctrl+shift+j            scroll_line_down
map ctrl+shift+u            scroll_page_up
map ctrl+shift+d            scroll_page_down

# Tabs
map ctrl+shift+t            new_tab
map ctrl+shift+w            close_tab
map ctrl+shift+right        next_tab
map ctrl+shift+left         previous_tab

# Windows
map ctrl+shift+enter        new_window
map ctrl+shift+]            next_window
map ctrl+shift+[            previous_window
