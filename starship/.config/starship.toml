# Starship prompt — Nord Theme / Pure style
# ~/.config/starship.toml

command_timeout = 1000

format = """
$directory$git_branch$git_status$cmd_duration
$character"""

add_newline = true

palette = "nord"

[palettes.nord]
nord0 = "#2E3440"
nord1 = "#3B4252"
nord2 = "#434C5E"
nord3 = "#4C566A"
nord4 = "#D8DEE9"
nord5 = "#E5E9F0"
nord6 = "#ECEFF4"
nord7 = "#8FBCBB"
nord8 = "#88C0D0"
nord9 = "#81A1C1"
nord10 = "#5E81AC"
nord11 = "#BF616A"
nord12 = "#D08770"
nord13 = "#EBCB8B"
nord14 = "#A3BE8C"
nord15 = "#B48EAD"

[character]
success_symbol = "[❯](nord14)"
error_symbol = "[❯](nord11)"
vimcmd_symbol = "[❮](nord9)"

[directory]
style = "nord9"
truncation_length = 3
truncate_to_repo = false
format = "[$path]($style) "
read_only = " 󰌾"
read_only_style = "nord11"

[git_branch]
symbol = " "
style = "nord8"
format = "[$symbol$branch]($style) "
truncation_length = 20

[git_status]
style = "nord13"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "= "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "? "
stashed = "$ "
modified = "! "
staged = "[+${count}](nord14)"
renamed = "» "
deleted = "✘ "

[cmd_duration]
min_time = 2000
style = "nord3"
format = "[$duration]($style) "

[python]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[package]
disabled = true

[memory_usage]
disabled = true

[time]
disabled = true

[username]
show_always = false

[hostname]
ssh_only = true
